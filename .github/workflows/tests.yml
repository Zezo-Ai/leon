name: Tests

on:
  push:
    # branches: [master, develop]
    branches: [master]
  pull_request:
    # branches: [master, develop]
    branches: [master]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - name: Use Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.x

      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: 16.x
          cache: npm

      - name: Install
        run: npm install

      - name: Run agent unit tests
        run: npm run test:agent:unit

      - name: Run workflow unit tests
        run: npm run test:workflow:unit

      - name: Run workflow e2e tests
        run: npm run test:workflow:e2e
